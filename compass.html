<!DOCTYPE html>
<html>
<head>
  <title>Your Compass Result</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Your Personal Compass</h1>
<p>This chart shows your EK and EL position.</p>

<div class="compass-container">
  <div class="compass-label label-top">Justice</div>
  <div class="compass-label label-bottom">Mercy</div>
  <div class="compass-label label-right">Orthodox</div>
  <div class="compass-label label-left">Heterodox</div>
  <canvas id="personalChart" width="500" height="500"></canvas>
</div>

<!-- Load your chart code -->
<script src="script.js"></script>

<!-- NEW: Read EK + EL from URL and pass to script.js -->
<script>
  // Read EK and EL from the URL
  const urlParams = new URLSearchParams(window.location.search);
  const ek = parseFloat(urlParams.get("ek"));
  const el = parseFloat(urlParams.get("el"));

  // Make them available to script.js
  window.personalEK = ek;
  window.personalEL = el;

  // Now load the chart
  loadPersonalCompass();
</script>

</body>
</html>
