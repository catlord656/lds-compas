<!DOCTYPE html>
<html>
<head>
  <title>Your Compass Result</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .compass-container {
      position: relative;
      width: 500px;
      margin: 20px auto;
    }
    .compass-label {
      position: absolute;
      font-weight: bold;
      font-size: 16px;
    }
    .label-top {
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
    }
    .label-bottom {
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
    }
    .label-left {
      left: -60px;
      top: 50%;
      transform: translateY(-50%);
    }
    .label-right {
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>

<h1>Your Personal Compass</h1>
<p>This chart shows your EK and EL position.</p>

<div class="compass-container">
  <div class="compass-label label-top">Justice</div>
  <div class="compass-label label-bottom">Mercy</div>
  <div class="compass-label label-left">Orthodox</div>
  <div class="compass-label label-right">Heterodox</div>
  <canvas id="personalChart" width="500" height="500"></canvas>
</div>

<script src="script.js"></script>
<script>
  loadPersonalCompass();
</script>

</body>
</html>
